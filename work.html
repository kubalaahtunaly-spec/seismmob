<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сейсмограф воды</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* ФОНОВЫЕ СЛОИ */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
        
        .container { width: 100%; max-width: 850px; z-index: 1; padding: 10vh 0; }
        
        /* СТРАНИЦЫ */
        img.page { display: block; width: 100%; height: auto; margin-bottom: 100px; opacity: 0.55; transition: 0.4s; cursor: pointer; }
        .cover { opacity: 1 !important; cursor: default !important; margin-bottom: 150px !important; }
        .dark-page { filter: invert(1) hue-rotate(180deg) brightness(1.2); mix-blend-mode: screen; }
        .page-active { opacity: 1 !important; }
        
        /* ИНТЕРФЕЙС */
        .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: #fff; z-index: 1000; width: 0%; }
        #continue-btn { 
            position: fixed; bottom: 30px; right: 30px; padding: 12px 20px; 
            background: #fff; color: #000; border: none; border-radius: 12px; 
            cursor: pointer; z-index: 2000; display: none; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* КОНЦОВКА */
        .credits { text-align: center; padding: 100px 20px 150px 20px; z-index: 1; line-height: 1.8; width: 100%; max-width: 600px; }
        .credits .role { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 35px; letter-spacing: 2px; }
        .credits p { margin: 8px 0 0 0; font-size: 18px; color: #ddd; }
    </style>
</head>
<body>

    <div class="progress-bar" id="myBar"></div>
    <div id="bg-1" class="bg-layer"></div>
    <div id="bg-2" class="bg-layer"></div>
    <div class="overlay"></div>

    <button id="continue-btn" onclick="resumeReading()">ПРОДОЛЖИТЬ ЧТЕНИЕ</button>

    <div class="container" id="main-content"></div>

    <div class="credits">
   
        <div style="font-family: monospace; opacity: 0.4; margin-bottom: 40px; letter-spacing: 2px; font-size: 12px;">
            КОНЕЦ ПРОТОКОЛА // ОБЪЕКТ «БАЙКАЛ» — 2098
        </div>
        
        <span class="role">Архивные данные</span>
        <p>Невольный свидетель</p>

        <span class="role">Код</span>
        <p>Gemini и невольный свидетель</p>

        <span class="role">Визуальные воспоминания</span>
        <p>ChatGPT и стоковые архивы</p>

        <p style="margin-top: 70px; font-size: 17px; font-style: italic; opacity: 0.8; max-width: 450px; margin-left: auto; margin-right: auto; line-height: 1.6; font-weight: 300;">
            "君の声を聴かせてよ ずっと" <br><br> 
            "Дай мне услышать твой голос... Всегда." <br>
            <span style="font-size: 14px; opacity: 0.7;">@ Sakanaction - Megaakuaiiro</span>
        </p>

        <div style="margin-top: 60px; color: #fff; letter-spacing: 5px; font-size: 18px; text-transform: uppercase; font-weight: bold;">
            Мин харыстыы сылдьыам.
        </div>
    </div>

    <script>
        const totalPages = 114;
        const container = document.getElementById('main-content');
        const bgLayers = [document.getElementById('bg-1'), document.getElementById('bg-2')];
        let currentLayerIndex = 0;
        let lastBgFile = "";

        // Создаем страницы от 1 до 114
        for (let i = 1; i <= totalPages; i++) {
            const img = document.createElement('img');
            img.src = i + '.jpg'; 
            img.classList.add('page');
            if (i === 1) img.classList.add('cover');
            else {
                img.classList.add('dark-page');
                img.onclick = function() { this.classList.toggle('page-active'); };
            }
            container.appendChild(img);
        }

        function updateContent() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (docHeight <= 0) return;

            const scrolled = (scrollTop / docHeight) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";

            // Текущая страница
            const p = Math.floor((scrollTop / (docHeight + 1)) * totalPages) + 1;

            // Сохранение позиции
            if (scrollTop > 400 && scrolled < 98) {
                localStorage.setItem('readerPosition', scrollTop);
            }

// ИСПРАВЛЕННАЯ ЛОГИКА ФОНОВ
            let bgFile = "";
            
            if (p >= 110) bgFile = "end.webp";
            else if (p >= 105 && p <= 109) bgFile = "star.webp"; // ДОБАВИЛ ЭТУ СТРОКУ
            else if (p >= 101 && p <= 104) bgFile = "cloud.webp";
            else if (p >= 99 && p <= 100) bgFile = "arbuz.webp";
            else if (p >= 90 && p <= 98) bgFile = "star.webp";
            else if (p >= 88 && p <= 89) bgFile = "fomaruka.webp";
            else if (p >= 85 && p <= 87) bgFile = "zvezdi.webp";
            else if (p >= 84) bgFile = "star.webp";
            else if (p >= 80 && p <= 83) bgFile = "cloud.webp";
            else if (p >= 78 && p <= 79) bgFile = "lampa.webp";
            else if (p >= 75 && p <= 76) bgFile = "noch.webp";
            else if (p >= 68 && p <= 74) bgFile = "cloud.webp";
            else if (p >= 66 && p <= 67) bgFile = "cloud.webp";
            else if (p >= 65 && p < 66) bgFile = "kafe.webp"; 
            else if (p >= 64 && p < 65) bgFile = "varyaruka.webp";
            else if (p >= 59 && p <= 63) bgFile = "kafe.webp";
            else if (p >= 54 && p <= 58) bgFile = "gorod.webp";
            else if (p >= 51 && p <= 53) bgFile = "cloud.webp";
            else if (p >= 45 && p <= 47) bgFile = "obereg.webp";
            else if (p >= 42 && p <= 43) bgFile = "svecha.webp";
            else if (p >= 38 && p <= 39) bgFile = "kauta.webp";
            else if (p >= 35 && p <= 37) bgFile = "nochnik.webp";
            else if (p >= 26 && p <= 34) bgFile = "cloud.webp";
            else if (p >= 20 && p <= 25) bgFile = "varya.webp";
            else if (p >= 9 && p <= 12) bgFile = "komnata.png";
            else if (p >= 2 && p <= 8) bgFile = "ocean.webp";

            // Смена фона
            if (bgFile !== lastBgFile) {
                const nextLayerIndex = 1 - currentLayerIndex;
                if (bgFile) {
                    bgLayers[nextLayerIndex].style.backgroundImage = "url('" + bgFile + "')";
                    bgLayers[nextLayerIndex].style.opacity = "0.7";
                    bgLayers[currentLayerIndex].style.opacity = "0";
                    currentLayerIndex = nextLayerIndex;
                } else {
                    bgLayers.forEach(l => l.style.opacity = "0");
                }
                lastBgFile = bgFile;
            }
        }

        function resumeReading() {
            const saved = localStorage.getItem('readerPosition');
            if (saved) window.scrollTo({ top: parseInt(saved), behavior: 'smooth' });
            document.getElementById('continue-btn').style.opacity = "0";
            setTimeout(() => { document.getElementById('continue-btn').style.display = "none"; }, 500);
        }

        window.addEventListener('scroll', updateContent);
        window.onload = function() {
            updateContent();
            if (localStorage.getItem('readerPosition')) {
                const btn = document.getElementById('continue-btn');
                btn.style.display = "block";
            }
        };
    </script>
</body>
</html>
