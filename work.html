<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сейсмограф воды</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #ccc;
            --overlay-bg: rgba(0,0,0,0.6);
            --btn-bg: rgba(30, 30, 30, 0.9);
            --btn-text: #fff;
            --terminal-green: #00ff41;
        }

        body.light-mode {
            --bg-color: #f5f5f5;
            --text-color: #1a1a1a;
            --overlay-bg: rgba(255,255,255,0.1);
            --btn-bg: rgba(255, 255, 255, 0.9);
            --btn-text: #000;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; transition: background-color 0.5s;
            overflow-x: hidden;
        }

        /* --- СТИЛИ ТЕРМИНАЛА (ПРЕЛОАДЕРА) --- */
        #memory-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--terminal-green); z-index: 30000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .terminal { 
            width: 90%; max-width: 600px; padding: 25px; 
            border: 1px solid #004400; background: rgba(0, 5, 0, 0.98);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }
        #log-screen { 
            height: 300px; overflow-y: hidden; font-size: 13px; line-height: 1.6; 
            margin-bottom: 20px; display: flex; flex-direction: column; justify-content: flex-end; 
        }
        .log-line { margin: 2px 0; opacity: 0.9; }
        .log-error { color: #ff4b4b; font-weight: bold; }
        .log-success { color: var(--terminal-green); }
        .terminal-progress-wrapper { width: 100%; height: 2px; background: #001100; margin: 15px 0; }
        #terminal-bar { width: 0%; height: 100%; background: var(--terminal-green); transition: width 0.3s; }
        
        #init-btn { 
            display: none; width: 100%; padding: 15px; background: transparent; 
            border: 1px solid var(--terminal-green); color: var(--terminal-green); 
            font-family: inherit; font-size: 14px; cursor: pointer; letter-spacing: 2px;
            transition: 0.3s;
        }
        #init-btn:hover { background: var(--terminal-green); color: #000; }

        /* --- ОСНОВНОЙ КОНТЕНТ (СКРЫТ ИЗНАЧАЛЬНО) --- */
        #main-wrapper { width: 100%; display: none; opacity: 0; transition: opacity 1.5s ease; flex-direction: column; align-items: center; }

        /* ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.2s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); z-index: -1; }
        .container { width: 100%; max-width: 850px; z-index: 1; padding: 10vh 0; }
        img.page { display: block; width: 100%; height: auto; margin-bottom: 100px; opacity: 0.45; transition: opacity 0.5s; cursor: pointer; }
        .cover { opacity: 1 !important; margin-bottom: 150px !important; }
        .dark-page { filter: invert(1) grayscale(1) contrast(1.4); }
        body.light-mode img.page[src$=".jpg"] { filter: none !important; opacity: 0.75; }
        .page-active, body.light-mode .page-active { opacity: 1 !important; }
        .controls-top { position: fixed; top: 0; left: 0; width: 100%; height: 45px; display: flex; align-items: center; justify-content: center; z-index: 15000; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); opacity: 0.3; transition: 0.3s; }
        .controls-top:hover { opacity: 1; background: rgba(0,0,0,0.8); }
        .brightness-slider { width: 120px; height: 4px; cursor: pointer; margin-left: 15px; accent-color: #fff; }
        .progress-bar { position: fixed; top: 45px; left: 0; height: 2px; background: #fff; z-index: 14000; width: 0%; }
        body.light-mode .progress-bar { background: #000; }
        #continue-btn { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer; z-index: 20000; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; transition: 0.4s; }
        #theme-toggle { position: fixed; bottom: 30px; left: 30px; padding: 10px 18px; background: var(--btn-bg); color: var(--btn-text); border: 1px solid rgba(128,128,128,0.3); border-radius: 8px; cursor: pointer; z-index: 10000; font-size: 10px; font-weight: bold; }
        .credits { text-align: center; padding: 100px 20px 150px 20px; z-index: 1; line-height: 1.8; width: 100%; max-width: 600px; }
        .credits .role { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 35px; letter-spacing: 2px; }
        .credits p { margin: 8px 0 0 0; font-size: 18px; color: var(--text-color); opacity: 0.9; }
        .quote-block { margin-top: 70px; font-size: 17px; font-style: italic; opacity: 0.8; max-width: 450px; margin-left: auto; margin-right: auto; line-height: 1.6; font-weight: 300; }
        .final-phrase { margin-top: 60px; letter-spacing: 5px; font-size: 18px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div id="memory-loader">
        <div class="terminal">
            <div id="log-screen"></div>
            <div class="terminal-progress-wrapper"><div id="terminal-bar"></div></div>
            <button id="init-btn" onclick="startReading()">ИНИЦИИРОВАТЬ ЧТЕНИЕ</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div class="controls-top">
            <span style="font-size: 9px; color: #fff; letter-spacing: 1px;">ЯРКОСТЬ СТРАНИЦ</span>
            <input type="range" id="brightRange" class="brightness-slider" min="0.4" max="1.6" step="0.05" value="1">
        </div>

        <div class="progress-bar" id="myBar"></div>
        <div id="bg-1" class="bg-layer"></div>
        <div id="bg-2" class="bg-layer"></div>
        <div class="overlay"></div>

        <button id="theme-toggle" onclick="toggleTheme()">РЕЖИМ ТЕМЫ</button>
        <button id="continue-btn" onclick="resumeReading()">ПРОДОЛЖИТЬ ЧТЕНИЕ ↓</button>

        <div class="container" id="main-content"></div>

        <div class="credits">
            <div style="font-family: monospace; opacity: 0.4; margin-bottom: 40px; letter-spacing: 2px; font-size: 12px;">
                КОНЕЦ ПРОТОКОЛА // ОБЪЕКТ «БАЙКАЛ» — 2098
            </div>
            <span class="role">Архивные данные</span>
            <p>Невольный свидетель</p>
            <span class="role">Код</span>
            <p>Gemini и невольный свидетель</p>
            <span class="role">Визуальные воспоминания</span>
            <p>ChatGPT и стоковые архивы</p>
            <div class="quote-block">
                "君の声を聴かせてよ ずっと" <br><br> 
                "Дай мне услышать твой голос... Всегда." <br>
                <span style="font-size: 14px; opacity: 0.7;">@ Sakanaction - Megaakuaiiro</span>
            </div>
            <div class="final-phrase">Мин харыстыы сылдьыам.</div>
        </div>
    </div>

    <script>
        const totalPages = 114;
        const container = document.getElementById('main-content');
        const bgLayers = [document.getElementById('bg-1'), document.getElementById('bg-2')];
        const brightSlider = document.getElementById('brightRange');
        let currentLayerIndex = 0;
        let lastBgFile = "";

        // --- ЛОГИКА ТЕРМИНАЛА ---
        const logs = [
            { t: "ПОДКЛЮЧЕНИЕ К ОБЪЕКТУ 'БАЙКАЛ'...", type: "system" },
            { t: "Сектор 9. Каюта уборщика. Анализ среды...", type: "line" },
            { t: "ОШИБКА: ПОВРЕЖДЕН ФАЙЛ 'ПАМЯТЬ_О_БЕРЕГЕ'", type: "error", fix: "Заменено на: Шум дождя (varya_track)." },
            { t: "Загрузка артефактов: фотохромные очки, швабра.", type: "line" },
            { t: "Синхронизация: Фома (48), Лина (16).", type: "line" },
            { t: "ОШИБКА: ДЕФЕКТ ИЛЛЮМИНАТОРА (ДАВЛЕНИЕ)", type: "error", fix: "Статус: Стабильно. Вода прибывает." },
            { t: "Уу кистэлэҥэ суох...", type: "line" },
            { t: "Протокол 'Сейсмограф воды' готов.", type: "success" }
        ];

        let logIdx = 0;
        function runTerminal() {
            const screen = document.getElementById('log-screen');
            const bar = document.getElementById('terminal-bar');
            
            if (logIdx < logs.length) {
                const entry = logs[logIdx];
                const line = document.createElement('div');
                line.className = 'log-line';
                
                if (entry.type === 'error') {
                    line.className += ' log-error';
                    line.innerHTML = entry.t;
                    screen.appendChild(line);
                    // Автоматическое исправление через секунду
                    setTimeout(() => {
                        line.innerHTML = ">> RECOVERED: " + entry.fix;
                        line.className = 'log-line log-success';
                        logIdx++;
                        bar.style.width = (logIdx / logs.length * 100) + "%";
                        setTimeout(runTerminal, 500);
                    }, 1000);
                } else {
                    line.innerHTML = entry.t;
                    if (entry.type === 'success') line.className += ' log-success';
                    screen.appendChild(line);
                    logIdx++;
                    bar.style.width = (logIdx / logs.length * 100) + "%";
                    setTimeout(runTerminal, 700);
                }
                screen.scrollTop = screen.scrollHeight;
            } else {
                document.getElementById('init-btn').style.display = "block";
            }
        }

        function startReading() {
            const loader = document.getElementById('memory-loader');
            const wrapper = document.getElementById('main-wrapper');
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
                wrapper.style.display = "flex";
                setTimeout(() => wrapper.style.opacity = "1", 50);
                updateContent();
            }, 1000);
        }

        // --- ТВОЯ ЛОГИКА САЙТА ---
        brightSlider.oninput = function() {
            const val = this.value;
            document.querySelectorAll('.dark-page').forEach(p => {
                p.style.filter = `invert(1) grayscale(1) contrast(1.4) brightness(${val})`;
            });
            localStorage.setItem('userBrightness', val);
        };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        for (let i = 1; i <= totalPages; i++) {
            const img = document.createElement('img');
            img.src = i + '.jpg'; 
            img.classList.add('page');
            if (i === 1) img.classList.add('cover');
            else {
                img.classList.add('dark-page');
                img.onclick = function() { this.classList.toggle('page-active'); };
            }
            container.appendChild(img);
        }

        function updateContent() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (docHeight > 0) {
                document.getElementById("myBar").style.width = (scrollTop / docHeight * 100) + "%";
                if (scrollTop > 600) localStorage.setItem('readerPosition', Math.floor(scrollTop));
            }
            const p = Math.floor((scrollTop / (docHeight + 1)) * totalPages) + 1;
            
            let bgFile = "";
            if (p >= 110) bgFile = "end.webp";
            else if (p >= 105 && p <= 109) bgFile = "star.webp";
            else if (p >= 101 && p <= 104) bgFile = "cloud.webp";
            else if (p >= 99 && p <= 100) bgFile = "arbuz.webp";
            else if (p >= 90 && p <= 98) bgFile = "star.webp";
            else if (p >= 88 && p <= 89) bgFile = "fomaruka.webp";
            else if (p >= 85 && p <= 87) bgFile = "zvezdi.webp";
            else if (p >= 84) bgFile = "star.webp";
            else if (p >= 80 && p <= 83) bgFile = "cloud.webp";
            else if (p >= 78 && p <= 79) bgFile = "lampa.webp";
            else if (p >= 75 && p <= 76) bgFile = "noch.webp";
            else if (p >= 68 && p <= 74) bgFile = "cloud.webp";
            else if (p >= 66 && p <= 67) bgFile = "cloud.webp";
            else if (p >= 65 && p < 66) bgFile = "kafe.webp"; 
            else if (p >= 64 && p < 65) bgFile = "varyaruka.webp";
            else if (p >= 59 && p <= 63) bgFile = "kafe.webp";
            else if (p >= 54 && p <= 58) bgFile = "gorod.webp";
            else if (p >= 51 && p <= 53) bgFile = "cloud.webp";
            else if (p >= 45 && p <= 47) bgFile = "obereg.webp";
            else if (p >= 42 && p <= 43) bgFile = "svecha.webp";
            else if (p >= 38 && p <= 39) bgFile = "kauta.webp";
            else if (p >= 35 && p <= 37) bgFile = "nochnik.webp";
            else if (p >= 26 && p <= 34) bgFile = "cloud.webp";
            else if (p >= 20 && p <= 25) bgFile = "varya.webp";
            else if (p >= 9 && p <= 12) bgFile = "komnata.png";
            else if (p >= 2 && p <= 8) bgFile = "ocean.webp";

            if (bgFile && bgFile !== lastBgFile) {
                const n = 1 - currentLayerIndex;
                bgLayers[n].style.backgroundImage = `url('${bgFile}')`;
                bgLayers[n].style.opacity = "0.7";
                bgLayers[currentLayerIndex].style.opacity = "0";
                currentLayerIndex = n;
                lastBgFile = bgFile;
            }
        }

        function resumeReading() {
            const s = localStorage.getItem('readerPosition');
            if (s) {
                window.scrollTo({ top: parseInt(s), behavior: 'smooth' });
                document.getElementById('continue-btn').style.display = "none";
            }
        }

        window.addEventListener('scroll', updateContent);
        window.onload = function() {
            runTerminal(); // Запуск терминала
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
            const b = localStorage.getItem('userBrightness');
            if (b) { brightSlider.value = b; setTimeout(() => brightSlider.oninput(), 200); }
            const pos = localStorage.getItem('readerPosition');
            if (pos && parseInt(pos) > 600) document.getElementById('continue-btn').style.display = "block";
        };
    </script>
</body>
</html>
