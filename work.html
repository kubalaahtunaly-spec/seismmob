<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сейсмограф воды</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #ccc;
            --overlay-bg: rgba(0,0,0,0.7);
            --terminal-green: #00ff41;
            --btn-bg: rgba(30, 30, 30, 0.95);
            --btn-text: #fff;
            --accent-blue: #007bff;
        }

        body.light-mode {
            --bg-color: #f5f5f5;
            --text-color: #1a1a1a;
            --overlay-bg: rgba(255,255,255,0.1);
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            min-height: 100vh; transition: background-color 0.5s;
            overflow-x: auto;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ТЕРМИНАЛ ЗАГРУЗКИ --- */
        #memory-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--terminal-green); z-index: 30000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .terminal { width: 85%; max-width: 600px; padding: 25px; border: 1px solid #004400; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        #log-screen { height: 300px; overflow-y: hidden; font-size: 13px; line-height: 1.6; margin-bottom: 20px; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-line { margin: 2px 0; word-break: break-all; }
        .log-error { color: #ff4b4b; }
        .log-success { color: var(--terminal-green); }
        #terminal-bar { width: 0%; height: 3px; background: var(--terminal-green); transition: width 0.2s; }
        #init-btn { display: none; width: 100%; padding: 15px; background: transparent; border: 1px solid var(--terminal-green); color: var(--terminal-green); cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; }

        /* --- КОНТЕНТ --- */
        #main-wrapper { width: 100%; display: none; opacity: 0; transition: opacity 1.5s ease; flex-direction: column; align-items: center; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.2s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); z-index: -1; }
        .container { width: 92%; max-width: 850px; z-index: 1; padding: 8vh 0; }

        img.page { 
            display: block; width: 100%; height: auto; 
            margin-bottom: 100px; 
            opacity: 0.15; 
            transition: opacity 0.6s ease, filter 0.5s ease; 
        }
        
        body:not(.light-mode) img.page:not(.cover) {
            filter: invert(1) grayscale(1) contrast(1.2);
        }

        img.page.active { opacity: 1 !important; }
        .cover { opacity: 1 !important; margin-bottom: 150px !important; }

        #theme-toggle { position: fixed; bottom: 25px; left: 25px; padding: 12px 18px; background: var(--btn-bg); color: var(--btn-text); border: 1px solid rgba(128,128,128,0.3); border-radius: 50px; z-index: 10000; font-size: 10px; font-weight: bold; cursor: pointer; }
        #continue-btn { position: fixed; bottom: 25px; right: 25px; padding: 12px 22px; background: #fff; color: #000; border: none; border-radius: 50px; z-index: 10000; font-weight: bold; font-size: 11px; display: none; cursor: pointer; }
        .progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--accent-blue); z-index: 14000; width: 0%; }

        .credits { text-align: center; padding: 100px 20px 180px 20px; z-index: 1; }
    </style>
</head>
<body class="">
<div id="memory-loader">
    <div class="terminal">
        <div id="log-screen"></div>
        <div id="terminal-bar"></div>
        <button id="init-btn" onclick="startReading()">ИНИЦИИРОВАТЬ ЧТЕНИЕ</button>
    </div>
</div>

<div id="main-wrapper">
    <div class="progress-bar" id="myBar"></div>
    <div id="bg-1" class="bg-layer"></div>
    <div id="bg-2" class="bg-layer"></div>
    <div class="overlay"></div>

    <button id="theme-toggle" onclick="toggleTheme()">РЕЖИМ: ДЕНЬ / НОЧЬ</button>
    <button id="continue-btn" onclick="resumeReading()">ПРОДОЛЖИТЬ ↓</button>

    <div class="container" id="main-content"></div>

   <div class="credits">
            <div style="font-family: monospace; opacity: 0.4; margin-bottom: 40px; letter-spacing: 2px; font-size: 12px;">
                КОНЕЦ ПРОТОКОЛА // ОБЪЕКТ «БАЙКАЛ» — 2098
            </div>
            <span class="role">Архивные данные</span>
            <p>Невольный свидетель</p>
            <span class="role">Код</span>
            <p>Gemini и невольный свидетель</p>
            <span class="role">Визуальные воспоминания</span>
            <p>ChatGPT и стоковые архивы</p>
            <p style="margin-top: 70px; font-size: 17px; font-style: italic; opacity: 0.8; max-width: 450px; margin-left: auto; margin-right: auto; line-height: 1.6;">
                "君の声を聴かせてよ ずっと" <br><br> 
                "Дай мне услышать твой голос... Всегда." <br>
                <span style="font-size: 14px; opacity: 0.7;">@ Sakanaction - Megaakuaiiro</span>
            </p>
            <div style="margin-top: 60px; color: #fff; letter-spacing: 5px; font-size: 18px; text-transform: uppercase; font-weight: bold;">
                Мин харыстыы сылдьыам.
            </div>
        </div>

  <script>
        const totalPages = 114;
        const logs = [
         { t: "ПОДКЛЮЧЕНИЕ К АРХИВАМ ОБЪЕКТА 'БАЙКАЛ'...", type: "system" },
            { t: "Синхронизация потоков данных...", type: "line" },
            { t: "ОШИБКА: ПОВРЕЖДЕН ФАЙЛ 'МИН_ХАРЫСТЫЫ_СЫЛДЬЫАМ'", type: "error", fix: "Сектор восстановлен." },
            { t: "Загрузка визуальных воспоминаний...", type: "line" },
            { t: "ОШИБКА: НИЗКОЕ ДАВЛЕНИЕ В СЕКТОРЕ 7", type: "error", fix: "Иллюминаторы заблокированы." },
            { t: "Уу кистэлэҥэ суох. Протокол бэлэм.", type: "success" }
        ];

let logIdx = 0;

function runTerminal() {
    const screen = document.getElementById('log-screen');
    if (logIdx < logs.length) {
        const entry = logs[logIdx];
        const line = document.createElement('div');
        line.className = 'log-line';
        if (entry.type === 'error') line.classList.add('log-error');
        screen.appendChild(line);

        line.innerHTML = "> " + entry.t;

        if (entry.type === 'error') {
            setTimeout(() => {
                line.innerHTML += " [FIXED]";
                line.className = 'log-line log-success';
                next();
            }, 500);
        } else next();
    } else {
        document.getElementById('init-btn').style.display = "block";
    }
}

function next() {
    logIdx++;
    document.getElementById('terminal-bar').style.width =
        (logIdx / logs.length * 100) + "%";
    setTimeout(runTerminal, 400);
}

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
        else entry.target.classList.remove('active');
    });
}, { threshold: 0.4 });

function startReading() {
    document.getElementById('memory-loader').style.display = "none";
    document.getElementById('main-wrapper').style.display = "flex";
    setTimeout(() => document.getElementById('main-wrapper').style.opacity = "1", 50);

    const container = document.getElementById('main-content');
    for (let i = 1; i <= totalPages; i++) {
        const img = document.createElement('img');
        img.src = i + '.jpg';
        img.classList.add('page');
        if (i === 1) img.classList.add('cover');
        container.appendChild(img);
        observer.observe(img);
    }
    updateContent();
}

function toggleTheme() { document.body.classList.toggle('light-mode'); }

const bgLayers = [document.getElementById('bg-1'), document.getElementById('bg-2')];
let currentLayerIndex = 0, lastBgFile = "";

function updateContent() {
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

    document.getElementById("myBar").style.width = (scrollTop / docHeight * 100) + "%";

    const p = Math.floor((scrollTop / (docHeight + 1)) * totalPages) + 1;

    // ← ВСТАВЛЕНА ТВОЯ ЛОГИКА
    let bgFile = "";
    if (p >= 110) bgFile = "end.webp";
    else if (p >= 105 && p <= 109) bgFile = "star.webp";
    else if (p >= 101 && p <= 104) bgFile = "cloud.webp";
    else if (p >= 99 && p <= 100) bgFile = "arbuz.webp";
    else if (p >= 90 && p <= 98) bgFile = "star.webp";
    else if (p >= 88 && p <= 89) bgFile = "fomaruka.webp";
    else if (p >= 85 && p <= 87) bgFile = "zvezdi.webp";
    else if (p >= 84) bgFile = "star.webp";
    else if (p >= 80 && p <= 83) bgFile = "cloud.webp";
    else if (p >= 78 && p <= 79) bgFile = "lampa.webp";
    else if (p >= 75 && p <= 76) bgFile = "noch.webp";
    else if (p >= 68 && p <= 74) bgFile = "cloud.webp";
    else if (p >= 66 && p <= 67) bgFile = "cloud.webp";
    else if (p >= 65 && p < 66) bgFile = "kafe.webp";
    else if (p >= 64 && p < 65) bgFile = "varyaruka.webp";
    else if (p >= 59 && p <= 63) bgFile = "kafe.webp";
    else if (p >= 54 && p <= 58) bgFile = "gorod.webp";
    else if (p >= 51 && p <= 53) bgFile = "cloud.webp";
    else if (p >= 45 && p <= 47) bgFile = "obereg.webp";
    else if (p >= 42 && p <= 43) bgFile = "svecha.webp";
    else if (p >= 38 && p <= 39) bgFile = "kauta.webp";
    else if (p >= 35 && p <= 37) bgFile = "nochnik.webp";
    else if (p >= 26 && p <= 34) bgFile = "cloud.webp";
    else if (p >= 20 && p <= 25) bgFile = "varya.webp";
    else if (p >= 9 && p <= 12) bgFile = "komnata.png";
    else if (p >= 2 && p <= 8) bgFile = "ocean.webp";

    if (bgFile && bgFile !== lastBgFile) {
        const n = 1 - currentLayerIndex;
        bgLayers[n].style.backgroundImage = `url('${bgFile}')`;
        bgLayers[n].style.opacity = "0.8";
        bgLayers[currentLayerIndex].style.opacity = "0";
        currentLayerIndex = n;
        lastBgFile = bgFile;
    }

    if (scrollTop > 800) localStorage.setItem('readerPosition', Math.floor(scrollTop));
}

function resumeReading() {
    const s = localStorage.getItem('readerPosition');
    if (s) {
        window.scrollTo({ top: parseInt(s), behavior: 'smooth' });
        const btn = document.getElementById('continue-btn');
        btn.style.opacity = "0";
        setTimeout(() => btn.style.display = "none", 400);
    }
}

window.addEventListener('scroll', updateContent, {passive: true});

window.onload = () => {
    runTerminal();
    if (parseInt(localStorage.getItem('readerPosition')) > 800) {
        document.getElementById('continue-btn').style.display = "block";
    }
};
</script>
</body>
</html>
